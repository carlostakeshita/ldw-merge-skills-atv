version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flask_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flaskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flask:
    build: .
    container_name: flask_app
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/flaskdb
      FLASK_APP: run.py
      FLASK_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "flask db upgrade && flask run --host=0.0.0.0"

volumes:
  postgres_data: